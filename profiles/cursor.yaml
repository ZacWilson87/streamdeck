name: cursor
label: Cursor
order: 2
match: Cursor
launch:
  mac: Cursor
  win: cursor.exe
keys:
  - {label: Dictate, action: voice_toggle}
  - {label: AI pane, icon: sym-ai-pane.png, action: {mac: hotkey cmd+l, win: hotkey ctrl+l}}
  - {label: Accept, icon: sym-accept.png, action: {mac: hotkey cmd+enter, win: hotkey ctrl+enter}}
  - {label: Reject, icon: sym-reject.png, action: {mac: hotkey cmd+backspace, win: hotkey ctrl+backspace}}
  - {label: Home, action: view HOME}
